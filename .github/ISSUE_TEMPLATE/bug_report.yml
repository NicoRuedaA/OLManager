name: Bug report
description: Report a reproducible problem in OLManager
title: "fix: "
labels: ["status:needs-review", "type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Search existing issues first and wait for `status:approved` before opening a PR.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence that reproduces the bug.
      placeholder: |
        1. Start a new save...
        2. Open...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.2.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS
        - Windows
        - Other / unknown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Drag files here if useful. Do not include secrets.
    validations:
      required: false
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I understand a PR must wait for maintainer `status:approved`.
          required: true
        - label: If this involves Leaguepedia, generated data, or inherited assets, I included provenance details or explained why none are needed.
          required: true
